  <line x1="34" y1="56" x2="86" y2="56" stroke="white" stroke-width="1.2" opacity="0.8"/>
  <line x1="36" y1="44" x2="84" y2="44" stroke="white" stroke-width="1.2" opacity="0.8"/>
  <line x1="36" y1="68" x2="84" y2="68" stroke="white" stroke-width="1.2" opacity="0.8"/>
